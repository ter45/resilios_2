name: CI — Edge

on:
  push:
    branches: [main, develop]
    paths:
      - "edge/**"
      - ".github/workflows/ci-edge.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "edge/**"

defaults:
  run:
    working-directory: edge

jobs:
  # ── Lint ──────────────────────────────────────
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: edge

      - name: RuboCop
        run: bundle exec rubocop --format github

  # ── Tests ─────────────────────────────────────
  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only
      RESILIOS_NODE_ID: test-node-001
      RESILIOS_NODE_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: edge

      - name: Setup DB
        run: bundle exec rails db:create db:schema:load

      - name: Run tests
        run: bundle exec rails test --format progress

      - name: Coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: edge-coverage
          path: edge/coverage/

  # ── Offline Chaos Test ────────────────────────
  chaos:
    name: Offline Chaos Test
    runs-on: ubuntu-latest
    needs: test
    env:
      RAILS_ENV: test
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: edge

      - name: Setup DB
        run: bundle exec rails db:create db:schema:load

      - name: Run chaos tests (offline simulation)
        run: bundle exec rails test test/chaos/ --format progress

  # ── Docker Build ──────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Edge image
        uses: docker/build-push-action@v5
        with:
          context: ./edge
          push: false
          tags: resilios/edge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
