name: "Bug Report"
description: "Reportar un defecto o comportamiento inesperado"
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severidad
      options:
        - "Crítico — bloquea operación del restaurante"
        - "Alto — afecta flujo principal pero hay workaround"
        - "Medio — funcionalidad secundaria afectada"
        - "Bajo — cosmético o menor"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Componente afectado
      options:
        - "Edge API"
        - "Sync Agent"
        - "Sync Engine (Cloud)"
        - "PWA Frontend"
        - "KDS"
        - "Portal Cloud"
        - "Docker / Infraestructura"
        - "CI/CD"
    validations:
      required: true

  - type: checkboxes
    id: offline_context
    attributes:
      label: Contexto de conectividad
      options:
        - label: El bug ocurre cuando el nodo Edge está offline
        - label: El bug ocurre durante la sincronización
        - label: El bug ocurre solo cuando hay internet

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      placeholder: "Qué ocurre vs qué debería ocurrir."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Desconectar red
        2. Crear un pedido
        3. Reconectar red
        4. Observar...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      render: shell
      placeholder: "Pega aquí el output de docker compose logs edge_api"
